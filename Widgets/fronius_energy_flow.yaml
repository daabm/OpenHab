                                  - component: oh-repeater
                                    config:
                                      comment: Sets up the circles, indicating the energy flow.
                                      for: offset
                                      fragment: true
                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2
                                      sourceType: range
                                    slots:
                                      default:
                                        - component: circle
                                          config:
                                            fill: "#999999"
                                            r: "=fn.resize_dot(#props.grid_power < 0 ? #props.grid_power : 0)"
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`
                                                  calcMode: linear
                                                  dur: 3s
                                                  repeatCount: indefinite
                                                slots:
                                                  default:
                                                    - component: mpath
                                                      config:
                                                        xlink:href: "#few_grid_path"
                            - component: g
                              config:
                                comment: Grid to load energy flow visualisation.
                                id: few_grid_to_load_flow
                              slots:

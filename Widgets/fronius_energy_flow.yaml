                                      d: '=#props.battery_charge >= 0 ? "M220 80 L180 120" : "M180 120 L220 80"'
                                      id: few_battery_path
                                      style:
                                        stroke: "#999999"
                                        stroke_width: 1px
                                  - component: oh-repeater
                                    config:
                                      comment: Sets up the circles, indicating the energy flow.
                                      for: offset
                                      fragment: true
                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2

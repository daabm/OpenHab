                margin-top: 10px
                padding-right: 10px
              width: 10
            slots:
              default:
                - component: oh-button
                  config:
                    action: variable
                    actionVariable: expandedErzeugung
                    actionVariableValue: "=vars.expandedErzeugung === 'true' ? 'false' : 'true'"
                    style:
                      --f7-button-bg-color: transparent
                      --f7-button-border-radius: 50%
                      --f7-button-height: 30px
                      --f7-button-width: 30px
                      align-items: center

                      height: 30px
                      justify-content: center
                      min-height: 30px
                      width: 30px
                  slots:
                    default:
                      - component: f7-icon
                        config:
                          f7: "=vars.expandedErzeugung === 'true' ? 'chevron_up' : 'chevron_down'"
                          size: 16
                          style:
                            color: "#666"
          - component: f7-col
            config:

                    borderColor: "#FDD835"
                    borderWidth: 8
                    item: =props.eigenverbrauchProzentItem
                    labelFontSize: 8
                    labelTextColor: var(--f7-text-color)
                    size: 52
                    type: circle
                    valueFontSize: 10

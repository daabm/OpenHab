component: f7-card
config:
  comment: This component determines the size of the widget.
  outline: true
  title: =props.title
slots:
  default:
    - component: oh-context
      config:
        comment: "'arc_flag' determines which arc should be drawn (short or long).
          'resize_dot' adjusts the size of the energy flow dots in relation to
          the highest value in the system. The value correlates to the area of
          the dot, not its radius to give a better visual feedback.
          'scale_to_deg' makes sure the input value does not exceed
          power_xxxx_max and scales everything to 270°. 'switch_color' handles
          power less than props.power_min and sets the color dependent on the
          data_source, based on the dictionary in the function.
          'switch_magnitude' switches between W an kW depending on the input
          value. 'to_cartesian' converts degree to cartesian coordinates to be
          used by arc."
        functions:
          arc_flag: "=degree => degree < 180 ? 0 : 1"
          resize_dot: "=value => Math.abs(value) < props.power_min ? 0 :
            `${Math.pow(Math.max(Math.abs(value) / Math.max(
            (Math.abs(#props.power_house) + (#props.power_grid > 0 ?
            #props.power_grid : 0)), Math.abs(#props.power_grid),
            Math.abs(#props.power_solar), Math.abs(#props.power_battery)),
            0.05), 0.5) * 5}px`"
          scale_to_deg: =(value, max) => Math.pow(Math.min(Math.abs(value), max) * (270 /
            max), props.exponent) * (270 / Math.pow(270, props.exponent))
          switch_color: '=(value, type) => (Math.abs(value) >= props.power_min) ?
            {"solar": props.color_solar, "grid": props.color_grid, "inverter":
            props.color_inverter, "house": props.color_house, "battery":
            props.color_battery, "ev": props.color_ev, "laundry":
            props.color_laundry, "heatpump": props.color_heatpump}[type] :
            "grey"'
          switch_magnitude: "=value => Math.abs(value) > 999 ? `${(Math.abs(value) /
            1000).toFixed(Math.abs(value) > 9999 ? 1 : 2)} kW` :
            `${Math.round(Math.abs(value)) | 0} W`"
          to_cartesian: =degree => (50 + Math.sin(degree * Math.PI / 180) * 41) + " " +
            (50 - Math.cos(degree * Math.PI / 180) * 41)
      slots:
        default:
          - component: f7-block
            config:
              style:
                content-justify: center
                display: flex
                height: 100%
                padding: 5%
                width: 100%
            slots:
              default:
                - component: svg
                  config:
                    comment: The component scales freely to the size of its parent.
                    height: 100%
                    viewBox: 0 0 500 300
                    width: 100%
                  slots:
                    default:
                      - component: defs
                        slots:
                          default:
                            - component: symbol
                              config:
                                id: few_segment_line
                              slots:
                                default:
                                  - component: line
                                    config:
                                      comment: Separator line for the dial.
                                      style:
                                        stroke: white
                                        stroke-width: 1px
                                      x1: 50px
                                      x2: 50px
                                      y1: 2px
                                      y2: 16px
                            - component: symbol
                              config:
                                comment: "Draws the background of each dial: Outer ring, scale backdrop, inner
                                  Ring."
                                id: few_rings
                              slots:
                                default:
                                  - component: circle
                                    config:
                                      comment: Outer ring. The stroke color uses the base color with less opacity.
                                      cx: 50px
                                      cy: 50px
                                      fill: white
                                      r: 49.5px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 1px
                                  - component: circle
                                    config:
                                      comment: Inner ring. The stroke color uses the base color with less opacity.
                                      cx: 50px
                                      cy: 50px
                                      fill: none
                                      r: 32.5px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 1px
                                  - component: path
                                    config:
                                      comment: Background of the dial. The stroke color uses the base color with less
                                        opacity.
                                      cx: 50px
                                      cy: 50px
                                      d: M50 9 A41 41 0 1 1 9 50
                                      fill: none
                                      r: 41px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 14px
                            - component: path
                              config:
                                comment: Path for numerical display of value.
                                d: M9,50 A41 41 0 0 1 50 9
                                fill: none
                                id: few_text_path
                                stroke-width: 0px
                      - component: g
                        config:
                          comment: Solar panel
                          id: few_solarpanel
                        slots:
                          default:
                            - component: g
                              config:
                                comment: Solar energy flow visualisation
                                id: few_solar_energy_flow
                              slots:
                                default:
                                  - component: path
                                    config:
                                      comment: Energy flow visualization solar.
                                      d: M80 80 L120 120
                                      id: few_solar_path
                                      style:
                                        stroke: darkgray
                                        stroke-width: 1px
                                  - component: oh-repeater
                                    config:
                                      comment: Sets up the circles, indicating the energy flow.
                                      for: offset
                                      fragment: true
                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2
                                      sourceType: range
                                    slots:
                                      default:
                                        - component: circle
                                          config:
                                            fill: =fn.switch_color(#props.power_solar, "solar")
                                            r: =fn.resize_dot(#props.power_solar)
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`
                                                  calcMode: linear
                                                  dur: 3s
                                                  repeatCount: indefinite
                                                slots:
                                                  default:
                                                    - component: mpath
                                                      config:
                                                        xlink:href: "#few_solar_path"
                            - component: use
                              config:
                                comment: Solar dial.
                                style:
                                  stroke: =fn.switch_color(#props.power_solar, "solar")
                                x: 0px
                                xlink:href: "#few_rings"
                                y: 0px
                            - component: path
                              config:
                                comment: Dial, using an exponential scale. If the value exceeds power_solar_max,
                                  the color dial turns red.
                                d: =`M50 9 A41 41 0 ${fn.arc_flag(fn.scale_to_deg(#props.power_solar,
                                  props.power_solar_max))} 1
                                  ${fn.to_cartesian(fn.scale_to_deg(#props.power_solar,
                                  props.power_solar_max))}`
                                fill: none
                                style:
                                  stroke: =(#props.power_solar < props.power_solar_max) ?
                                    fn.switch_color(#props.power_solar,
                                    "solar"):"red"
                                  stroke-width: 14px
                            - component: text
                              config:
                                style:
                                  dominant-baseline: central
                                  fill: dimgray
                                  font-family: sans-serif
                                  font-size: 11px
                                  font-weight: bold
                                  letter-spacing: 1px
                                  text-anchor: middle
                                  translate: 0px 0px
                              slots:
                                default:
                                  - component: textPath
                                    config:
                                      content: =fn.switch_magnitude(#props.power_solar)
                                      startOffset: 50%
                                      xlink:href: "#few_text_path"
                            - component: svg
                              config:
                                comment: solar icon
                                height: 44px
                                stroke-miterlimit: 10
                                stroke-width: 0.3px
                                viewBox: 0 0 24 24
                                width: 44px
                                x: 28px
                                y: 28px
                              slots:
                                default:
                                  - component: defs
                                    slots:
                                      default:
                                        - component: linearGradient
                                          config:
                                            comment: Gradient for solar battery SOC. y1 = 100% means "start at bottom"
                                            id: gradient_solar
                                            x1: 0

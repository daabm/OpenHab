                                                  offset: =(#props.power_solar / props.power_solar_max)
                                                  stop-color: =fn.switch_color(#props.power_solar, "solar")
                                              - component: stop
                                                config:
                                                  offset: 1
                                                  stop-color: =fn.switch_color(0, "solar")
                                  - component: path
                                    config:

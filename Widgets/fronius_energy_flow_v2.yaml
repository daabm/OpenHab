uid: generic_energy_flow_v3
tags:
  - energy
  - fronius
  - solar
props:
  parameters:
    - name: title
      label: Title
      required: false
      type: TEXT
      default: Fronius Power Flow
      groupName: design
    - name: exponent
      label: Exponent
      required: true
      advanced: true
      type: DECIMAL
      default: 0.68
      description: "Exponent for the scale (default: 0.68; 1=linear, reasonable values
        range from 0.5 to 2)"
      groupName: design
    - name: power_min
      label: Mininum Power value
      required: true
      advanced: true
      type: DECIMAL
      default: 10
      description: Minimum value for any power flow to be regarded active. Power below this value
        will be displayed, but regarded inactivity.
      groupName: design
    - name: color_solar
      label: Solar plant color
      required: true
      advanced: true
      type: TEXT
      default: gold
      description: CSS color name or hex value (#xxxxxx) for the solar plant
      groupName: design
    - name: color_battery
      label: Battery color
      required: true
      advanced: true
      type: TEXT
      default: limegreen
      description: CSS color name or hex value (#xxxxxx) for the solar battery
      groupName: design
    - name: color_inverter
      label: Solar inverter color
      required: true
      advanced: true
      type: TEXT
      default: red
      description: CSS color name or hex value (#xxxxxx) for the solar inverter
      groupName: design
    - name: color_grid
      label: Grid color
      required: true
      advanced: true
      type: TEXT
      default: purple
      description: CSS color name or hex value (#xxxxxx) for the grid
      groupName: design
    - name: color_house
      label: House color
      required: true
      advanced: true
      type: TEXT
      default: deepskyblue
      description: CSS color name or hex value (#xxxxxx) for the house
      groupName: design
    - name: color_ev
      label: EV color
      required: true
      advanced: true
      type: TEXT
      default: royalblue
      description: CSS color name or hex value (#xxxxxx) for the electric vehicle
      groupName: design
    - name: color_laundry
      label: Laundry color
      required: true
      advanced: true
      type: TEXT
      default: brown
      description: CSS color name or hex value (#xxxxxx) for the laundry
      groupName: design
    - name: color_heatpump
      label: Heat pump color
      required: true
      advanced: true
      type: TEXT
      default: darkorange
      description: CSS color name or hex value (#xxxxxx) for the heat pump
      groupName: design
    - name: power_solar
      label: Solar power
      required: true
      type: TEXT
      context: item
      description: Solar plant actual power in watts.
      groupName: data_sources_pv
    - name: power_solar1
      label: MPP tracker 1 power
      required: false
      type: TEXT
      context: item
      description: Solar actual power of maximum power point tracker 1 in watts. Shows
        in the popup hint of the solar plant.
      groupName: data_sources_pv
    - name: power_solar2
      label: MPP tracker 2 power
      required: false
      type: TEXT
      context: item
      description: Solar actual power of maximum power point tracker 2 in watts. Shows
        in the popup hint of the solar plant.
      groupName: data_sources_pv
    - name: power_inverter
      label: Inverter power
      required: true
      type: TEXT
      context: item
      description: Solar inverter actual power.
      groupName: data_sources_pv
    - name: power_solar_max
      label: Inverter maximum power
      required: true
      type: INTEGER
      default: 10000
      min: 800
      description: Solar inverter maximum power.
      groupName: data_sources_pv
    - name: power_house
      label: House power
      required: true
      type: TEXT
      context: item
      description: House actual power consumption.
      groupName: data_sources_pv
    - name: power_house_max
      label: House maximum power
      required: true
      type: INTEGER
      default: 22000
      min: 3840
      description: House maximum power consumption. Typically, this relates to your
        primary fuse amperage.
      groupName: data_sources_pv
      advanced: true
    - name: power_autonomy
      label: Autonomy
      required: false
      type: TEXT
      context: item
      description: Power actual autonomy in percent.
      groupName: data_sources_pv
    - name: power_grid
      label: Grid power
      required: true
      type: TEXT
      context: item
      description: Grid actual power delivery/consumption.
      groupName: data_sources_pv
    - name: power_grid_max
      label: Grid maximum power
      required: true
      advanced: true
      type: INTEGER
      default: 22000
      min: 3840
      description: Grid maximum power delivery/consumption. Usually the same as house
        maximum  power.
      groupName: data_sources_pv
    - name: power_battery
      label: Battery power
      required: true
      type: TEXT
      context: item
      description: Solar battery actual power delivery/consumption.
      groupName: data_sources_pv
    - name: soc_battery
      label: Battery SOC
      required: true
      type: TEXT
      context: item
      description: State of charge of the solar battery.
      groupName: data_sources_pv
    - name: energy_battery
      label: Battery capacity
      required: true
      advanced: true
      type: INTEGER
      default: 10200
      min: 1000
      description: Solar battery energy capacity in Wh.
      groupName: data_sources_pv
    - name: power_heatpump
      label: Heat pump power
      required: true
      type: TEXT
      context: item
      description: Power the heat pump consumes for heating and drinking water. If you
        don't select an item for this value, the heat pump will not be visible
        in the widget.
      groupName: data_sources_heating
    - name: power_heatpump_max
      label: Heatpump maximum power
      required: true
      advanced: true
      type: INTEGER
      default: 8000
      min: 1000
      description: Maximum power the heatpump can consume. Can be found in your pump's
        technical specifications.
      groupName: data_sources_heating
    - name: power_heating
      label: Heat pump - heating
      required: true
      type: TEXT
      context: item
      description: Heat pump power consumption for heating. Used to determine heating
        system state (heating/drinking water/defrosting/standby).
      groupName: data_sources_heating
    - name: power_drinking
      label: Heat pump - drinking water
      required: true
      type: TEXT
      context: item
      description: Heating system power consumption for drinking water. Used to
        determine heating system state (heating/drinking
        water/defrosting/standby).
      groupName: data_sources_heating
    - name: temp_heatpump
      label: Heat pump water flow temperature
      required: false
      type: TEXT
      context: item
      description: Heat pump water temperature - pre-flow temp of heat pump or
        whatever value suits your needs.
      groupName: data_sources_heating
    - name: status_heatpump
      label: Heat pump COP
      required: false
      type: TEXT
      context: item
      description: Heat pump efficiency (Coefficient of power, COP)
      groupName: data_sources_heating
    - name: power_ev
      label: EV battery power
      required: false
      type: TEXT
      context: item
      description: EV battery charging power. If you don't select an item for this
        value, the EV will not be visible in the widget.
      groupName: data_sources_ev
    - name: soc_ev
      label: EV battery SOC
      required: false
      type: TEXT
      context: item
      description: State of charge of the EV battery. If you don't select an item for
        this value, the EV will not be visible in the widget.
      groupName: data_sources_ev
    - name: range_ev
      label: EV range
      required: false
      type: TEXT
      context: item
      description: EV estimated driving range.
      groupName: data_sources_ev
    - name: chargestate_ev
      label: EV charging state
      required: false
      type: TEXT
      context: item
      description: Current charging state of the EV
      groupName: data_sources_ev
    - name: connected_ev
      label: EV connection state
      required: false
      type: TEXT
      context: item
      description: Current connection state of the EV
      groupName: data_sources_ev
    - name: power_laundry
      label: Laundry power
      required: false
      type: TEXT
      context: item
      description: Current power consumption of the laundry room. If you don't select
        an item for this value, the laundry will not be visible in the widget.
      groupName: data_sources_laundry
    - name: power_washing
      label: Washing power
      required: false
      type: TEXT
      context: item
      description: Current power consumption of the cloth washing machine
      groupName: data_sources_laundry
    - name: power_drying
      label: Drying power
      required: false
      type: TEXT
      context: item
      description: Current power consumption of the cloth drying machine
      groupName: data_sources_laundry
    - name: power_dehumidify
      label: Dehumidifying power
      required: false
      type: TEXT
      context: item
      description: Current power consumption of the dehumidifier
      groupName: data_sources_laundry
    - name: power_laundry_max
      label: Maximum laundry power
      required: false
      advanced: true
      type: INTEGER
      default: 2000
      min: 1000
      description: Maximum power the laundry can consume. Used to calculate percent
        background.
      groupName: data_sources_laundry
  parameterGroups:
    - name: design
      label: Design elements
    - name: data_sources_pv
      label: Data sources (solar plant, inverter and grid)
    - name: data_sources_ev
      label: Data sources (electric vehicle)
    - name: data_sources_heating
      label: Data sources (heating system)
    - name: data_sources_laundry
      label: Data sources (laundry room)

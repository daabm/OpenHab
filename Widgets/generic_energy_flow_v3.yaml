                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2
                                      sourceType: range
                                    slots:
                                      default:
                                        - component: circle
                                          config:
                                            fill: "#999999"
                                            r: "=fn.resize_dot(#props.power_grid < 0 ? #props.power_grid : 0)"
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`
                                                  calcMode: linear
                                                  dur: 3s
                                                  repeatCount: indefinite
                                                slots:
                                                  default:
                                                    - component: mpath
                                                      config:
                                                        xlink:href: "#few_grid_path"
                            - component: g

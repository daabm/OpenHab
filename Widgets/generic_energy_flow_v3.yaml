component: f7-card
config:
  comment: This component determines the size of the widget.
  outline: true
  title: =props.title
slots:
  default:
    - component: oh-context
      config:
        comment: "'arc_flag' determines which arc should be drawn (short or long).
          'resize_dot' adjusts the size of the energy flow dots in relation to
          the highest value in the system. The value correlates to the area of
          the dot, not its radius to give a better visual feedback.
          'scale_to_deg' makes sure the input value does not exceed
          max_solar_power or max_grid_power and scales everything to 270°.
          'switch_color' handles power less than 1 and sets the color dependent
          on the data_source, based on the dictionary in the function.
          'switch_magnitude' switches between W an kW depending on the input
          value. 'to_cartesian' converts degree to cartesian coordinates to be
          used by arc."
        functions:
          arc_flag: "=degree => degree < 180 ? 0 : 1"
          resize_dot: "=value => Math.abs(value) < 10 ? 0 :
            `${Math.pow(Math.max(Math.abs(value) / Math.max(
            (Math.abs(#props.power_load) + (#props.power_grid > 0 ?
            #props.power_grid : 0)), Math.abs(#props.power_grid),
            Math.abs(#props.power_solar), Math.abs(#props.power_battery)),
            0.05), 0.5) * 5}px`"
          scale_to_deg: =(value, max) => Math.pow(Math.min(Math.abs(value), max) * (270 /
            max), props.exponent) * (270 / Math.pow(270, props.exponent))
          switch_color: '=(value, type) => (Math.abs(value) >= 1) ? {"pv": props.color_solar,
            "grid": "#999999", "inverter": "#e2001a", "load": "#71afcd",
            "battery": "#6cbe58", "ev": "#000000", "laundry": "#000000"}[type] :
            "grey"'
          switch_magnitude: "=value => Math.abs(value) > 999 ? `${(value /
            1000).toFixed(Math.abs(value) > 9999 ? 1 : 2)} kW` :
            `${Math.round(value) | 0} W`"
          to_cartesian: =degree => (50 + Math.sin(degree * Math.PI / 180) * 41) + " " +
            (50 - Math.cos(degree * Math.PI / 180) * 41)
      slots:
        default:
          - component: f7-block
            config:
              style:
                display: flex
                height: 100%
                width: 100%
                content-justify: center
                padding: 5%
            slots:
              default:
                - component: svg
                  config:
                    comment: The component scales freely to the size of its parent.
                    height: 100%
                    viewBox: 0 0 500 300
                    width: 100%
                  slots:
                    default:
                      - component: defs
                        slots:
                          default:
                            - component: symbol
                              config:
                                id: few_segment_line
                              slots:
                                default:
                                  - component: line
                                    config:
                                      comment: Separator line for the dial.
                                      style:
                                        stroke: white
                                        stroke-width: 1px
                                      x1: 50px
                                      x2: 50px
                                      y1: 2px
                                      y2: 16px
                            - component: symbol
                              config:
                                comment: "Draws the background of each dial: Outer ring, scale backdrop, inner
                                  Ring."
                                id: few_rings
                              slots:
                                default:
                                  - component: circle
                                    config:
                                      comment: Outer ring. The stroke color uses the base color with less opacity.
                                      cx: 50px
                                      cy: 50px
                                      fill: white
                                      r: 49.5px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 1px
                                  - component: circle
                                    config:
                                      comment: Inner ring. The stroke color uses the base color with less opacity.
                                      cx: 50px
                                      cy: 50px
                                      fill: rgba(0, 0, 0, 0)
                                      r: 32.5px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 1px
                                  - component: path
                                    config:
                                      comment: Background of the dial. The stroke color uses the base color with less
                                        opacity.
                                      cx: 50px
                                      cy: 50px
                                      d: M50 9 A41 41 0 1 1 9 50
                                      fill: rgba(0, 0, 0, 0)
                                      r: 41px
                                      style:
                                        stroke-opacity: 0.4
                                        stroke-width: 14px
                            - component: path
                              config:
                                comment: Path for numerical display of value.
                                d: M9,50 A41 41 0 0 1 50 9
                                fill: rgba(0, 0, 0, 0)
                                id: few_text_path
                                stroke-width: 0px
                      - component: g
                        config:
                          comment: Solar panel
                          id: few_solarpanel
                        slots:
                          default:
                            - component: g
                              config:
                                comment: Solar energy flow visualisation
                                id: few_solar_energy_flow
                              slots:
                                default:
                                  - component: path
                                    config:
                                      comment: Energy flow visualization solar.
                                      d: M80 80 L120 120
                                      id: few_solar_path
                                      style:
                                        stroke: "#999999"
                                        stroke_width: 1px
                                  - component: oh-repeater
                                    config:
                                      comment: Sets up the circles, indicating the energy flow.
                                      for: offset
                                      fragment: true
                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2
                                      sourceType: range
                                    slots:
                                      default:
                                        - component: circle
                                          config:
                                            fill: "#f7c002"
                                            r: =fn.resize_dot(#props.solar_power)
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`
                                                  calcMode: linear
                                                  dur: 3s
                                                  repeatCount: indefinite
                                                slots:
                                                  default:
                                                    - component: mpath
                                                      config:
                                                        xlink:href: "#few_solar_path"
                            - component: use
                              config:
                                comment: PV dial.
                                style:
                                  stroke: =fn.switch_color(#props.power_solar, "pv")
                                x: 0px
                                xlink:href: "#few_rings"
                                y: 0px
                            - component: path
                              config:
                                comment: Dial, using an exponential scale. If the value exceeds power_solar_max,
                                  the color dial turns red.
                                d: =`M50 9 A41 41 0 ${fn.arc_flag(fn.scale_to_deg(#props.power_solar,
                                  props.power_solar_max))} 1
                                  ${fn.to_cartesian(fn.scale_to_deg(#props.power_solar,
                                  props.power_solar_max))}`
                                fill: rgba(0, 0, 0, 0)
                                style:
                                  stroke: '=(Math.abs(#props.power_solar) < props.power_solar_max) ?
                                    fn.switch_color(#props.power_solar, "pv") :
                                    "#f70202"'
                                  stroke-width: 14px
                            - component: text
                              config:
                                style:
                                  dominant-baseline: central
                                  fill: rgb(127, 127, 127)
                                  font-family: sans-serif
                                  font-weight: bold
                                  font-size: 11px
                                  letter-spacing: 1px
                                  text-anchor: middle
                                  translate: 0px 0px
                              slots:
                                default:
                                  - component: textPath
                                    config:
                                      content: =fn.switch_magnitude(#props.power_solar)
                                      startOffset: 50%
                                      xlink:href: "#few_text_path"
                            - component: image
                              config:
                                comment: Solar pv icon.
                                height: 44px
                                width: 44px
                                x: 28px
                                xlink:href: =`/icon/fronius_pv?format=svg&anyFormat=true&iconset=classic`
                                y: 28px
                      - component: g
                        config:
                          comment: Battery
                          id: few_battery
                        slots:
                          default:
                            - component: g
                              config:
                                comment: Energy flow visualisation
                                id: few_battery_energy_flow
                              slots:
                                default:
                                  - component: path
                                    config:
                                      comment: Energy flow visualization battery.
                                      d: '=#props.power_battery >= 0 ? "M220 80 L180 120" : "M180 120 L220 80"'
                                      id: few_battery_path
                                      style:
                                        stroke: "#999999"
                                        stroke_width: 1px
                                  - component: oh-repeater
                                    config:
                                      comment: Sets up the circles, indicating the energy flow.
                                      for: offset
                                      fragment: true
                                      rangeStart: 0
                                      rangeStep: 1
                                      rangeStop: 2
                                      sourceType: range
                                    slots:
                                      default:
                                        - component: circle
                                          config:
                                            fill: "#6cbe58"
                                            r: =fn.resize_dot(#props.power_battery)
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`
                                                  calcMode: linear
                                                  dur: 3s
                                                  repeatCount: indefinite
                                                slots:
                                                  default:
                                                    - component: mpath
                                                      config:
                                                        xlink:href: "#few_battery_path"
                            - component: use
                              config:
                                comment: Battery dial.
                                style:
                                  stroke: "#6cbe58"
                                x: 200px
                                xlink:href: "#few_rings"
                                y: 0px
                            - component: path
                              config:
                                comment: Dial, using a linear scale.
                                d: =`M50 9 A41 41 0 ${fn.arc_flag(#props.soc_battery * 270)} 1
                                  ${fn.to_cartesian(#props.soc_battery * 270)}`
                                fill: rgba(0, 0, 0, 0)
                                style:
                                  stroke: "#6cbe58"
                                  stroke-width: 14px
                                  translate: 200px 0px
                            - component: text
                              config:
                                style:
                                  dominant-baseline: central
                                  fill: rgb(127, 127, 127)
                                  font-family: sans-serif
                                  font-weight: bold
                                  font-size: 11px
                                  letter-spacing: 1px
                                  text-anchor: middle
                                  translate: 200px 0px
                              slots:
                                default:
                                  - component: textPath
                                    config:
                                      content: =fn.switch_magnitude(-1 * (#props.power_battery))
                                      startOffset: 50%
                                      xlink:href: "#few_text_path"
                            - component: image
                              config:
                                comment: Battery icon
                                height: 44px
                                width: 44px
                                x: 228px
                                xlink:href: '=`/icon/fronius_battery${#props.power_battery < 0 ? "_charging" :
                                  ""}-${25 * Math.round(#props.soc_battery *
                                  4)}?format=svg&anyFormat=true&iconset=classic`'
                                y: 28px
                              slots:
                                default:
                                  - component: title
                                    config:
                                      content: '=`${#props.soc_battery > 0 ? "Disc" : "C"}harging with
                                        ${fn.switch_magnitude(Math.abs(#props.power_battery))}.`'
                      - component: g
                        config:
                          comment: Grid
                          id: few_grid
                        slots:
                          default:
                            - component: g
                              config:
                                comment: Grid energy flow visualisation
                                id: few_grid_energy_flow

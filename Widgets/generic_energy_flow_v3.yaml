                                xlink:href: =`/icon/fronius_gen24?format=svg&anyFormat=true&iconset=classic`
                                y: 128px
                              slots:
                                default:
                                  - component: title
                                    config:
                                      content: "=`Autonomy: ${@props.power_autonomy || '--'}`"
                      - component: g
                        config:

                                          config:
                                            fill: "#999999"
                                            r: "=fn.resize_dot(#props.power_grid > 0 ? #props.power_grid : 0)"
                                          slots:
                                            default:
                                              - component: animateMotion
                                                config:
                                                  begin: =`${loop.offset}s`

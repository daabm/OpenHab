uid: generic_energy_flow_v3
tags:
  - energy
  - fronius
  - solar
props:
  parameters:
    - default: Fronius Power Flow
      label: Title
      name: title
      required: false
      type: TEXT
      groupName: design
    - default: "0.68"
      description: "Exponent for the scale (default: 0.68; 1=linear, reasonable values
        range from 0.5 to 2)"
      label: Exponent
      name: exponent
      required: false
      groupName: design
      advanced: true
    - default: gold
      description: CSS color name for the solar plant
      label: Solar plant color
      name: color_solar
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: red
      description: CSS color name for the solar inverter
      label: Solar plant color
      name: color_inverter
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: green
      description: CSS color name for the house
      label: House color
      name: color_house
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: seagreen
      description: CSS color name for the solar battery
      label: Battery color
      name: color_battery
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: royalblue
      description: CSS color name for the electric vehicle
      label: EV color
      name: color_ev
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: gray
      description: CSS color name for the grid
      label: Grid color
      name: color_grid
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: brown
      description: CSS color name for the laundry
      label: Laundry color
      name: color_laundry
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - default: red
      description: CSS color name for the heat pump
      label: Heat pump color
      name: color_heatpump
      required: false
      type: TEXT
      groupName: design
      advanced: true
    - context: item
      description: Current solar power in Watts. Typically this would be the solar
        yield item for a Fronius inverter.
      label: Solar power
      name: power_solar
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: Current solar power of MPPT1 in Watts.
      label: MPPT 1
      name: power_solar1
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: Current solar power of MPPT2 in Watts
      label: MPPT 2
      name: power_solar2
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: inverter power. Used to calculate percent background.
      label: inverter power
      name: power_inverter
      required: true
      type: TEXT
      groupName: data_sources_pv
    - default: "10000"
      description: Maximum solar inverter power. Used to calculate percent background.
      label: Maximum inverter power
      name: power_solar_max
      required: true
      type: INTEGER
      min: 1000
      groupName: data_sources_pv
    - context: item
      description: Current house power consumption
      label: House power
      name: power_load
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: Current energy autonomy.
      label: Autonomy
      name: power_autonomy
      required: true
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: Power the grid delivers or receives
      label: Grid power
      name: power_grid
      required: false
      type: TEXT
      groupName: data_sources_pv
    - default: "22000"
      description: Maximum power to and from grid. Used to calculate percent background.
      label: Maximum grid power
      name: power_grid_max
      required: false
      type: INTEGER
      min: 1
      groupName: data_sources_pv
      advanced: true
    - context: item
      description: Power the solar battery delivers or consumes
      label: Battery power
      name: power_battery
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: State of charge of the solar battery
      label: Solar battery SOC
      name: soc_battery
      required: false
      type: TEXT
      groupName: data_sources_pv
    - context: item
      description: Power the heating system consumes for heating and drinking water.
      label: Heating system power consumption
      name: power_heatpump
      required: false
      type: TEXT
      groupName: data_sources_heating
    - default: "8000"
      description: Maximum power the heatpump can consume. Used to calculate percent
        background.
      label: Maximum heatpump power
      name: power_heatpump_max
      required: false
      type: INTEGER
      min: 1000
      groupName: data_sources_heating
      advanced: true
    - context: item
      description: Heating system power consumption for heating. Only used to
        determine heating system state.
      label: Heating system power consumption for heating
      name: power_heating
      required: false
      type: TEXT
      groupName: data_sources_heating
    - context: item
      description: Heating system power consumption for drinking water. Only used to
        determine heating system state.
      label: Heating system power - drinking water
      name: power_drinking
      required: false
      type: TEXT
      groupName: data_sources_heating
    - context: item
      description: Heating system water temperature - pre-flow temp of heat pump or
        whatever value suits your needs.
      label: Heating system water temperature
      name: temp_heatpump
      required: false
      type: TEXT
      groupName: data_sources_heating
    - context: item
      description: Heating system efficiency (Coefficient of power, COP)
      label: Heating system COP
      name: status_heatpump
      required: false
      type: TEXT
      groupName: data_sources_heating
    - context: item
      description: EV battery charging power
      label: EV battery charging power
      name: power_ev
      required: false
      type: TEXT
      groupName: data_sources_ev
    - context: item
      description: EV battery state of charge
      label: EV battery percent
      name: soc_ev
      required: false
      type: TEXT
      groupName: data_sources_ev
    - context: item
      description: EV driving range estimated
      label: EV range
      name: range_ev
      required: false
      type: TEXT
      groupName: data_sources_ev
    - context: item
      description: Current charging state of the EV
      label: EV charging state
      name: chargestate_ev
      required: false
      type: TEXT
      groupName: data_sources_ev
    - context: item
      description: Current connection state of the EV
      label: EV connection state
      name: connected_ev
      required: false
      type: TEXT
      groupName: data_sources_ev
    - context: item
      description: Current power consumption of the laundry room
      label: Laundry power
      name: power_laundry
      required: false
      type: TEXT
      groupName: data_sources_laundry
    - default: "2000"
      description: Maximum power the laundry can consume. Used to calculate percent
        background.
      label: Maximum laundry power
      name: power_laundry_max
      required: false
      type: INTEGER
      min: 1000
      groupName: data_sources_laundry
      advanced: true
  parameterGroups:
    - name: design
      label: Design elements
      description: Group of parameters which determine the visual appearance of the widget.
    - name: data_sources_pv
      label: Data sources (solar plant)
      description: Group of parameters which deliver data for solar power production.
    - name: data_sources_ev
      label: Data sources (electric vehicle)
      description: Group of parameters which deliver data for electric vehicles.
    - name: data_sources_heating
      label: Data sources (heating system)
      description: Group of parameters which deliver data for heating and drinking water.
    - name: data_sources_laundry
      label: Data sources (laundry room)
      description: Group of parameters which deliver data for washing and drying clothes.
